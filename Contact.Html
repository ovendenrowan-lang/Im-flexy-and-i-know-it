<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Contact Us</title>

    <meta name="description" content="Contact form for fitness questions, support, or feedback.">
    <meta name="keywords" content="contact form, fitness help, gym support">
    <meta name="author" content="Rowan">

    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Contact Us</h1>
    <nav>
        <a href="index.html">Home</a>
        <a href="workouts.html">Workouts</a>
        <a href="nutrition.html">Nutrition Tips</a>
        <a href="about.html">About</a>
        <a href="contact.html">Contact</a>
    </nav>
</header>

<section>
    <h2>Send a Message</h2>

    <form id="contactForm">
        <label>Name:</label>
        <input type="text" id="name" required>

        <label>Email:</label>
        <input type="email" id="email" required>

        <label>Reason for Contact:</label>
        <select id="reason">
            <option>General Inquiry</option>
            <option>Workout Advice</option>
            <option>Nutrition Question</option>
            <option>Feedback</option>
        </select>

        <label>Preferred Contact Method:</label>
        <input type="radio" name="method" value="email" checked>Email
        <input type="radio" name="method" value="phone">Phone

        <label>Your Message:</label>
        <textarea id="message" required></textarea>

        <button type="submit">Submit</button>
    </form>

    <p id="formStatus"></p>
</section>

<footer>
    <p>© 2026 I'm Flexy And I Know It</p>
</footer>

<script src="script.js"></script>
</body>
</html>
